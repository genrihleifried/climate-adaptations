<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSV Import - Climate Adaptations</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        .messages { list-style: none; padding: 0; }
        .messages li { padding: 0.5rem; margin-bottom: 0.5rem; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .warning { background: #fff3cd; color: #856404; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Import CSV-File</h1>
    <p><a href="{% url 'adaptation_list' %}">&larr; Back to Table</a></p>

    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
        <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}

    <p>Expected columns: name, climate_impact, type, sector
    </p>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Import</button>
    </form>
</body>
</html>
